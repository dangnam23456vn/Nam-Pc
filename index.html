
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nam PC</title>
<link rel="icon" type="image/png" href="https://i.postimg.cc/j2zt9snH/nampc.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#050d18;
  --surface:#071523;
  --card:rgba(10,28,50,0.75);
  --card2:#0d2035;
  --border:rgba(0,180,255,0.10);
  --border-h:rgba(0,180,255,0.28);
  --text:#dff4ff;
  --muted:#2d5a72;
  --muted2:#5a9ab5;
  --c1:#00c8ff;
  --c2:#0ea5e9;
  --c3:#38bdf8;
  --c4:#00f0d4;
  --s-online:#00f0a0;
  --s-idle:#f5a623;
  --s-dnd:#f04747;
  --s-offline:#2d5a72;
  --r:20px;
  --r-sm:12px;
}

html,body{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  overflow-x:hidden;
}

/* ══════════════════════════════════
   ANIMATED BACKGROUND
══════════════════════════════════ */
.bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}

/* Stars */
.stars{
  position:absolute;inset:0;
}
.star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--dur,3s) ease-in-out infinite var(--del,0s) alternate;
}
@keyframes twinkle{0%{opacity:.1;transform:scale(.8);}100%{opacity:.8;transform:scale(1.2);}}

/* Auroras */
.aurora{
  position:absolute;border-radius:50%;filter:blur(80px);
  mix-blend-mode:screen;
  animation:auroraMove var(--ad,14s) ease-in-out infinite alternate var(--adl,0s);
}
.a1{
  width:600px;height:400px;top:-80px;left:-120px;
  background:radial-gradient(ellipse,rgba(0,100,255,0.22) 0%,rgba(0,200,255,0.12) 40%,transparent 70%);
  --ad:16s;--adl:0s;
}
.a2{
  width:700px;height:500px;bottom:-150px;right:-150px;
  background:radial-gradient(ellipse,rgba(0,230,200,0.15) 0%,rgba(0,160,255,0.10) 40%,transparent 70%);
  --ad:20s;--adl:-6s;
}
.a3{
  width:400px;height:300px;top:35%;left:30%;
  background:radial-gradient(ellipse,rgba(80,0,255,0.10) 0%,rgba(0,200,255,0.07) 50%,transparent 70%);
  --ad:12s;--adl:-3s;
}
.a4{
  width:350px;height:250px;top:10%;right:5%;
  background:radial-gradient(ellipse,rgba(0,255,200,0.08) 0%,transparent 70%);
  --ad:18s;--adl:-9s;
}
@keyframes auroraMove{
  0%{transform:translate(0,0) scale(1) rotate(0deg);}
  100%{transform:translate(40px,30px) scale(1.15) rotate(8deg);}
}

/* Grid lines */
.grid-lines{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,180,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,255,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
}

/* Shooting stars */
.shoot{
  position:absolute;
  width:2px;height:2px;border-radius:50%;background:white;
  animation:shoot var(--sd,4s) linear infinite var(--sdl,0s);
  opacity:0;
}
.shoot::after{
  content:'';position:absolute;top:50%;right:0;
  width:120px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6));
  transform:translateY(-50%);
}
.s1{top:8%;left:20%;--sd:5s;--sdl:0s;}
.s2{top:20%;left:60%;--sd:7s;--sdl:-2.5s;}
.s3{top:5%;left:45%;--sd:6s;--sdl:-1s;}
@keyframes shoot{
  0%{opacity:0;transform:translate(0,0);}
  5%{opacity:1;}
  50%{opacity:0;transform:translate(300px,200px);}
  100%{opacity:0;transform:translate(300px,200px);}
}

/* Floating orbs */
.orb{
  position:absolute;border-radius:50%;filter:blur(2px);
  animation:orbFloat var(--of,8s) ease-in-out infinite alternate var(--ofd,0s);
}
.o1{width:4px;height:4px;background:#00c8ff;top:25%;left:15%;--of:6s;--ofd:0s;box-shadow:0 0 8px 2px rgba(0,200,255,0.8);}
.o2{width:3px;height:3px;background:#00f0d4;top:60%;left:80%;--of:9s;--ofd:-3s;box-shadow:0 0 6px 2px rgba(0,240,212,0.8);}
.o3{width:5px;height:5px;background:#5865f2;top:45%;left:50%;--of:7s;--ofd:-1s;box-shadow:0 0 10px 3px rgba(88,101,242,0.6);}
.o4{width:3px;height:3px;background:#00c8ff;top:75%;left:25%;--of:11s;--ofd:-5s;box-shadow:0 0 6px 2px rgba(0,200,255,0.7);}
.o5{width:4px;height:4px;background:#0ea5e9;top:15%;left:70%;--of:8s;--ofd:-2s;box-shadow:0 0 8px 2px rgba(14,165,233,0.7);}
@keyframes orbFloat{
  0%{transform:translate(0,0);}
  100%{transform:translate(20px,-25px);}
}

/* Scan line overlay */
.scanline{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
}

/* ══════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════ */
.wrap{
  position:relative;z-index:1;
  max-width:480px;margin:0 auto;
  padding:52px 20px 60px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}

/* ── AVATAR ── */
.avatar-zone{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  animation:riseUp .7s cubic-bezier(.22,1,.36,1) both;
}
.av-ring-wrap{position:relative;width:108px;height:108px;}
.av-ring{
  position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(#00c8ff,#0ea5e9,#5865f2,#00f0d4,#00c8ff);
  animation:spin 5s linear infinite;
}
.av-ring::after{
  content:'';position:absolute;inset:3px;border-radius:50%;
  background:var(--bg);
}
.av-img{
  position:absolute;inset:0;z-index:2;
  width:108px;height:108px;border-radius:50%;
  background:linear-gradient(135deg,#061a28,#0d2a40);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:800;color:var(--c1);
  overflow:hidden;
  box-shadow:0 0 0 2px var(--bg);
}
.av-img img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;border-radius:50%;
}
.av-status{
  position:absolute;z-index:10;
  bottom:3px;right:3px;
  width:19px;height:19px;border-radius:50%;
  border:2.5px solid var(--bg);
  background:var(--s-offline);
  transition:background .4s,box-shadow .4s;
}
.av-status.online{background:var(--s-online);box-shadow:0 0 8px var(--s-online);}

.av-name{text-align:center;}
.av-name h1{
  font-size:1.9rem;font-weight:800;letter-spacing:-.04em;
  background:linear-gradient(120deg,var(--text) 0%,#00c8ff 50%,#00f0d4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.av-name p{font-size:.82rem;color:var(--muted2);letter-spacing:.06em;margin-top:2px;}

.status-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(10,28,50,0.7);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:99px;padding:5px 14px;
  font-size:.78rem;font-weight:500;color:var(--s-offline);
}
.status-pill.online{color:var(--s-online);border-color:rgba(61,214,140,.25);}
.sp-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;animation:blink 1.6s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* ── TAGS ── */
.tags{
  display:flex;flex-wrap:wrap;gap:7px;justify-content:center;
  animation:riseUp .7s .1s cubic-bezier(.22,1,.36,1) both;
}
.tag{
  background:rgba(10,28,50,0.6);
  backdrop-filter:blur(10px);
  border:1px solid var(--border);
  border-radius:99px;padding:4px 13px;
  font-size:.75rem;color:var(--muted2);
  transition:border-color .2s,color .2s,transform .2s;
}
.tag:hover{border-color:var(--border-h);color:var(--text);transform:translateY(-2px);}

/* ── CARDS / GLASS ── */
.glass{
  width:100%;
  background:rgba(9,26,40,0.65);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  position:relative;
}
.glass::before{
  content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);
}

/* ── LINK GRID ── */
.links-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  width:100%;
  animation:riseUp .7s .15s cubic-bezier(.22,1,.36,1) both;
}
.lnk{
  display:flex;align-items:center;gap:11px;
  padding:14px 16px;border-radius:var(--r);
  background:rgba(9,26,40,0.65);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--border);
  text-decoration:none;color:var(--text);
  transition:transform .22s,border-color .25s,box-shadow .25s,background .2s;
  position:relative;overflow:hidden;cursor:pointer;
}
.lnk::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,var(--lc,var(--c1)) 0%,transparent 70%);
  transition:opacity .25s;
}
.lnk:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:var(--lc,var(--c1));
  box-shadow:0 12px 36px rgba(0,0,0,.4),0 0 24px -4px var(--lc,var(--c1));
}
.lnk:hover::before{opacity:.08;}
.lnk-ico{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.05);
  position:relative;z-index:1;
  transition:transform .2s;
}
.lnk:hover .lnk-ico{transform:scale(1.1);}
.lnk-ico svg{width:20px;height:20px;}
.lnk-txt{position:relative;z-index:1;}
.lnk-name{font-size:.86rem;font-weight:700;line-height:1;}
.lnk-sub{font-size:.7rem;color:var(--muted2);margin-top:2px;}

.lnk-roblox{--lc:#e53c2e;} .lnk-roblox .lnk-ico{background:rgba(229,60,46,.13);}
.lnk-discord{--lc:#5865f2;} .lnk-discord .lnk-ico{background:rgba(88,101,242,.13);}
.lnk-fb{--lc:#1877f2;} .lnk-fb .lnk-ico{background:rgba(24,119,242,.13);}
.lnk-yt{--lc:#ff0000;} .lnk-yt .lnk-ico{background:rgba(255,0,0,.13);}

/* ── FOOTER ── */
.foot{
  font-size:.72rem;color:var(--muted);
  animation:riseUp .7s .35s cubic-bezier(.22,1,.36,1) both;
}

/* ══════════════════════════════════
   FLOATING MUSIC WIDGET
══════════════════════════════════ */
.music-widget{
  position:fixed;bottom:80px;right:20px;
  z-index:9999;
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;
}
.mw-toggle{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,#00c8ff,#0ea5e9);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(0,200,255,.5);
  transition:transform .2s,box-shadow .2s;flex-shrink:0;
}
.mw-toggle:hover{transform:scale(1.12);box-shadow:0 6px 32px rgba(0,200,255,.65);}
.mw-toggle svg{width:22px;height:22px;fill:#fff;display:block;}

.mw-panel{
  width:300px;
  background:rgba(7,21,35,0.88);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:0 16px 48px rgba(0,0,0,.7),0 0 0 1px rgba(0,200,255,0.06) inset;
  transform-origin:bottom right;
  transition:transform .25s cubic-bezier(.22,1,.36,1),opacity .25s;
}
.mw-panel.hidden{transform:scale(.85) translateY(12px);opacity:0;pointer-events:none;}

.player-inner{background:transparent;border:none;padding:14px 16px;position:relative;overflow:hidden;}
.player-inner::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#00c8ff,#5865f2,#00f0d4);
}

.pl-top{display:flex;align-items:center;gap:13px;margin-bottom:15px;}
.disc{width:50px;height:50px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--card2);position:relative;overflow:hidden;}
.disc-spin{position:absolute;inset:0;border-radius:10px;background:conic-gradient(#00c8ff,#5865f2,#00f0d4,#00c8ff);opacity:.7;animation:spin 3s linear infinite;}
.disc-spin.paused{animation-play-state:paused;}
.disc-center{position:relative;z-index:1;width:18px;height:18px;border-radius:50%;background:var(--card2);border:2px solid rgba(255,255,255,.15);}
.t-info{flex:1;min-width:0;}
.t-name{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-artist{font-size:.72rem;color:var(--muted2);margin-top:2px;}
.pl-eq{display:flex;align-items:flex-end;gap:2px;height:17px;flex-shrink:0;}
.pl-eq-bar{width:3px;border-radius:2px;background:var(--c1);animation:eqA .6s ease-in-out infinite alternate;}
.pl-eq-bar:nth-child(1){animation-delay:0s;height:55%;}
.pl-eq-bar:nth-child(2){animation-delay:.1s;height:100%;}
.pl-eq-bar:nth-child(3){animation-delay:.2s;height:40%;}
.pl-eq-bar:nth-child(4){animation-delay:.05s;height:75%;}
.pl-eq-bar:nth-child(5){animation-delay:.15s;height:50%;}
.pl-eq-bar.paused{animation-play-state:paused;}

.seek-row{display:flex;align-items:center;gap:9px;margin-bottom:13px;}
.t{font-size:.68rem;color:var(--muted);width:30px;flex-shrink:0;}
.t.e{text-align:right;}
input[type=range].seek,input[type=range].vol{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:99px;outline:none;cursor:pointer;
  background:rgba(255,255,255,.08);
}
input[type=range].seek::-webkit-slider-thumb,
input[type=range].vol::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;cursor:pointer;transition:transform .15s;
}
input[type=range].seek::-webkit-slider-thumb{background:var(--c1);box-shadow:0 0 6px var(--c1);}
input[type=range].vol::-webkit-slider-thumb{background:var(--c2);box-shadow:0 0 6px var(--c2);}
input[type=range].seek::-webkit-slider-thumb:hover,
input[type=range].vol::-webkit-slider-thumb:hover{transform:scale(1.35);}

.ctrls{display:flex;align-items:center;justify-content:center;gap:16px;}
.cb{background:none;border:none;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:7px;border-radius:50%;transition:color .2s,background .2s,transform .15s;}
.cb:hover{color:var(--text);background:rgba(255,255,255,.06);}
.cb:active{transform:scale(.88);}
.cb svg{width:20px;height:20px;display:block;}
.cb.play{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#00c8ff,#0ea5e9);color:#fff;box-shadow:0 0 20px rgba(0,200,255,.4);}
.cb.play:hover{transform:scale(1.07);box-shadow:0 0 28px rgba(0,200,255,.6);}
.cb.play svg{width:21px;height:21px;}

.vol-row{display:flex;align-items:center;gap:9px;margin-top:13px;padding-top:13px;border-top:1px solid var(--border);}
.vol-ic{background:none;border:none;color:var(--muted2);cursor:pointer;display:flex;align-items:center;flex-shrink:0;transition:color .2s;padding:1px;}
.vol-ic:hover{color:var(--text);}
.vol-ic svg{width:17px;height:17px;display:block;}
.vol-pct{font-size:.68rem;color:var(--muted);width:30px;text-align:right;flex-shrink:0;}

.pl-panel{width:100%;background:transparent;border:none;border-top:1px solid var(--border);border-radius:0;overflow:hidden;}
.pl-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:background .2s,border-color .2s;}
.pl-head:hover{background:rgba(255,255,255,.02);}
.pl-head.open{border-color:var(--border);}
.ph-left{display:flex;align-items:center;gap:9px;font-size:.85rem;font-weight:700;}
.ph-left svg{width:17px;height:17px;color:var(--c1);}
.pl-cnt{font-size:.7rem;color:var(--muted2);background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.15);border-radius:99px;padding:2px 9px;font-weight:400;}
.ph-chevron{color:var(--muted);transition:transform .3s;}
.ph-chevron.open{transform:rotate(180deg);}
.ph-chevron svg{width:17px;height:17px;display:block;}

.pl-body{display:none;padding:14px 18px 18px;flex-direction:column;gap:12px;}
.pl-body.open{display:flex;}
.add-row{display:flex;flex-direction:column;gap:8px;}
.add-inputs{display:flex;gap:8px;}
.pl-in{flex:1;background:rgba(13,32,53,0.8);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;color:var(--text);font-size:.8rem;font-family:inherit;outline:none;transition:border-color .2s;min-width:0;}
.pl-in:focus{border-color:var(--c1);}
.pl-in::placeholder{color:var(--muted);}
.add-btn{padding:9px 15px;border-radius:var(--r-sm);background:linear-gradient(135deg,#00c8ff,#0ea5e9);border:none;color:#fff;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .2s,transform .15s;}
.add-btn:hover{opacity:.85;transform:scale(1.03);}

.track-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.track-list:empty::after{content:'Chưa có bài nào. Thêm link nhạc bên trên!';display:block;text-align:center;color:var(--muted);font-size:.75rem;padding:10px 0;}
.tr-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid transparent;cursor:pointer;transition:background .2s,border-color .2s;}
.tr-item:hover{background:rgba(255,255,255,.05);}
.tr-item.active{background:rgba(0,200,255,.08);border-color:rgba(0,200,255,.2);}
.tr-num{font-size:.7rem;color:var(--muted);width:17px;text-align:center;flex-shrink:0;}
.tr-item.active .tr-num{color:var(--c1);}
.tr-n{flex:1;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-del{background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;padding:2px;border-radius:5px;transition:color .2s,background .2s;flex-shrink:0;}
.tr-del:hover{color:#f06bba;background:rgba(240,107,186,.1);}
.tr-del svg{width:14px;height:14px;display:block;}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes riseUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes eqA{from{transform:scaleY(.25)}to{transform:scaleY(1)}}
</style>
</head>
<body>

<!-- ANIMATED BACKGROUND -->
<div class="bg-canvas">
  <div class="aurora a1"></div>
  <div class="aurora a2"></div>
  <div class="aurora a3"></div>
  <div class="aurora a4"></div>
  <div class="grid-lines"></div>
  <div class="stars" id="starField"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
  <div class="orb o5"></div>
  <div class="shoot s1"></div>
  <div class="shoot s2"></div>
  <div class="shoot s3"></div>
</div>
<div class="scanline"></div>

<div class="wrap">

  <!-- AVATAR -->
  <div class="avatar-zone">
    <div class="av-ring-wrap">
      <div class="av-ring"></div>
      <div class="av-img" id="avEl">
        <img id="avImg"
          src="https://i.postimg.cc/y8nKzspg/avatar.jpg"
          alt="Nam PC"
          onerror="this.style.display='none';document.getElementById('avInitial').style.display=''"/>
        <span id="avInitial" style="display:none">N</span>
      </div>
      <div class="av-status online" id="avBadge"></div>
    </div>

<audio id="aud"></audio>

<script>
// Generate stars
(function(){
  const sf = document.getElementById('starField');
  for(let i=0;i<160;i++){
    const s = document.createElement('div');
    s.className='star';
    const sz = Math.random()*2+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--del:${-Math.random()*5}s;opacity:${0.1+Math.random()*0.6}`;
    sf.appendChild(s);
  }
})();

// Music Player
const aud=document.getElementById('aud');
const btnPlay=document.getElementById('btnPlay');
const seekBar=document.getElementById('seekBar');
const curT=document.getElementById('curT');
const totT=document.getElementById('totT');
const tName=document.getElementById('tName');
const tArtist=document.getElementById('tArtist');
const discSpin=document.getElementById('discSpin');
const eqBars=document.querySelectorAll('.pl-eq-bar');
const fileIn=document.getElementById('fileIn');
const playIcoPath=document.getElementById('playIco');
const PLAY_PATH='M8 5v14l11-7z';
const PAUSE_PATH='M6 19h4V5H6v14zm8-14v14h4V5h-4z';

let playlist=[
  {name:'Hạt Mưa Vương Vấn',url:'https://cdn.discordapp.com/attachments/1459036268489998336/1491533519971815586/Hat_Mua_Vuong_Van_Haiyang_Remix_-_AIR_Cover_Hat_Mua_Vuong_Van_Em_Gio_Nay_ang_Noi_au_Remix.mp3?ex=69d80a56&is=69d6b8d6&hm=607c6fd359e323be0d9296a3b88d6be0ba07e24a60261a6293c465e9dbf9da48&'},
];
let cidx=0,playing=false;

function fmt(s){const m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+String(sc).padStart(2,'0');}
function setPlay(v){playing=v;playIcoPath.setAttribute('d',v?PAUSE_PATH:PLAY_PATH);discSpin.classList.toggle('paused',!v);eqBars.forEach(b=>b.classList.toggle('paused',!v));}
function loadTrack(i){if(!playlist.length)return;cidx=(i+playlist.length)%playlist.length;const t=playlist[cidx];aud.src=t.url;tName.textContent=t.name;tArtist.textContent='Nam PC · Playlist ('+(cidx+1)+'/'+playlist.length+')';aud.play().then(()=>setPlay(true)).catch(()=>{});}

btnPlay.addEventListener('click',()=>{if(!playlist.length){fileIn.click();return;}if(playing){aud.pause();setPlay(false);}else{aud.play();setPlay(true);}});
document.getElementById('btnPrev').addEventListener('click',()=>loadTrack(cidx-1));
document.getElementById('btnNext').addEventListener('click',()=>loadTrack(cidx+1));
document.getElementById('btnUpload').addEventListener('click',()=>fileIn.click());

fileIn.addEventListener('change',e=>{const files=Array.from(e.target.files);if(!files.length)return;playlist.forEach(t=>URL.revokeObjectURL(t.url));playlist=files.map(f=>({name:f.name.replace(/\.[^.]+$/,''),url:URL.createObjectURL(f)}));loadTrack(0);});

aud.addEventListener('timeupdate',()=>{if(!aud.duration)return;const p=(aud.currentTime/aud.duration)*100;seekBar.value=p;seekBar.style.background=`linear-gradient(90deg,var(--c1) ${p}%,rgba(255,255,255,.08) ${p}%)`;curT.textContent=fmt(aud.currentTime);});
aud.addEventListener('loadedmetadata',()=>{totT.textContent=fmt(aud.duration);});
seekBar.addEventListener('input',()=>{if(aud.duration)aud.currentTime=(seekBar.value/100)*aud.duration;});
aud.addEventListener('ended',()=>{playlist.length>1?loadTrack(cidx+1):setPlay(false);});

const volBar=document.getElementById('volBar');
const volPct=document.getElementById('volPct');
const btnMute=document.getElementById('btnMute');
const volIco=document.getElementById('volIco');
const iHigh=`<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`;
const iLow=`<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>`;
const iMute=`<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
let lastVol=0.8;
aud.volume=0.8;
function updateVol(v){const p=Math.round(v*100);volBar.value=p;volPct.textContent=p+'%';volBar.style.background=`linear-gradient(90deg,var(--c2) ${p}%,rgba(255,255,255,.08) ${p}%)`;volIco.innerHTML=v===0?iMute:v<.5?iLow:iHigh;}
volBar.addEventListener('input',()=>{const v=volBar.value/100;aud.volume=v;if(v>0)lastVol=v;updateVol(v);});
btnMute.addEventListener('click',()=>{if(aud.volume>0){lastVol=aud.volume;aud.volume=0;updateVol(0);}else{aud.volume=lastVol||.8;updateVol(aud.volume);}});
updateVol(.8);

const plHead=document.getElementById('plHead');
const plBody=document.getElementById('plBody');
const plChev=document.getElementById('plChev');
const plNameI=document.getElementById('plName');
const plUrlI=document.getElementById('plUrl');
const plAdd=document.getElementById('plAdd');
const tList=document.getElementById('tList');
const plCnt=document.getElementById('plCnt');

plHead.addEventListener('click',()=>{plBody.classList.toggle('open');plChev.classList.toggle('open');plHead.classList.toggle('open');});
function updCnt(){plCnt.textContent=playlist.length+' bài';}
function renderList(){
  tList.innerHTML='';
  playlist.forEach((t,i)=>{
    const el=document.createElement('div');
    el.className='tr-item'+(i===cidx&&playing?' active':'');
    el.innerHTML=`<span class="tr-num">${i+1}</span><span class="tr-n">${t.name}</span><button class="tr-del" data-i="${i}"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>`;
    el.addEventListener('click',e=>{if(e.target.closest('.tr-del'))return;loadTrack(i);renderList();});
    el.querySelector('.tr-del').addEventListener('click',()=>{playlist.splice(i,1);if(cidx>=playlist.length)cidx=playlist.length-1;if(!playlist.length){aud.pause();setPlay(false);aud.src='';tName.textContent='Chọn bài hát...';tArtist.textContent='Nam PC · Playlist';}updCnt();renderList();});
    tList.appendChild(el);
  });
  updCnt();
}

plAdd.addEventListener('click',()=>{const url=plUrlI.value.trim();if(!url){plUrlI.focus();return;}const n=plNameI.value.trim()||url.split('/').pop().replace(/\.[^.]+$/,'')||'Bài '+(playlist.length+1);playlist.push({name:n,url});plNameI.value='';plUrlI.value='';renderList();if(playlist.length===1)loadTrack(0);});
plUrlI.addEventListener('keydown',e=>{if(e.key==='Enter')plAdd.click();});
plNameI.addEventListener('keydown',e=>{if(e.key==='Enter')plUrlI.focus();});
aud.addEventListener('play',()=>renderList());
aud.addEventListener('pause',()=>renderList());

if(playlist.length){aud.src=playlist[0].url;tName.textContent=playlist[0].name;tArtist.textContent='Nam PC · Playlist (1/'+playlist.length+')';renderList();}

document.getElementById('mwToggle').addEventListener('click',()=>{document.getElementById('mwPanel').classList.toggle('hidden');});
</script>
